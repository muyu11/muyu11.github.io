<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人学术主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #f2f2f2;
        }
        section {
            margin: 20px 0;
        }
        h2 {
            color: #333;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin-bottom: 10px;
        }
        a {
            text-decoration: none;
            color: #007BFF;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>你的名字</h1>
        <p>学术主页</p>
    </header>

    <section>
        <h2>个人信息</h2>
        <ul>
            <li>Email: <a href="mailto:you@example.com">you@example.com</a></li>
            <li>GitHub: <a href="https://github.com/yourusername" target="_blank">yourusername</a></li>
            <!-- 添加其他个人信息 -->
        </ul>
    </section>

    <section>
        <h2>研究兴趣</h2>
        <p>你的研究兴趣和方向。</p>
    </section>

    <section>
        <h2>学术成果</h2>
        <ul>
            <li><strong>论文标题</strong>, 作者1, 作者2, <em>期刊</em>, 年份</li>
            <!-- 添加其他学术成果 -->
        </ul>
    </section>

    <section>
        <h2>教育经历</h2>
        <ul>
            <li><strong>博士学位</strong>, 专业, 学校, 年份</li>
            <!-- 添加其他教育经历 -->
        </ul>
    </section>

    <footer>
        <p>&copy; 2022 个人学术主页</p>
    </footer>

</body>
</html>
